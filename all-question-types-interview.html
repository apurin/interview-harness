<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Interview Harness All Question Types Test</title>
  </head>
  <body>
    <div id="interview-harness"></div>
    <script src="./interview-harness.js"></script>
    <script>
      const h = InterviewHarness;

      const compactPreview = `
        <style>
          body { margin: 0; font: 14px/1.4 system-ui, sans-serif; color: #202124; background: #f6f8fa; }
          .wrap { display: grid; gap: 10px; padding: 14px; }
          .bar { display: flex; align-items: center; justify-content: space-between; }
          .pill { border: 1px solid #c7d2fe; color: #3730a3; border-radius: 999px; padding: 3px 8px; background: #eef2ff; }
          .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
          .card { border: 1px solid #d8dee4; background: white; border-radius: 8px; padding: 10px; min-height: 56px; }
          .label { color: #57606a; font-size: 12px; }
          .value { font-weight: 650; margin-top: 4px; }
        </style>
        <div class="wrap">
          <div class="bar">
            <strong>Compact decision review</strong>
            <span class="pill">default path</span>
          </div>
          <div class="grid">
            <div class="card"><div class="label">Risk</div><div class="value">Explicit</div></div>
            <div class="card"><div class="label">Output</div><div class="value">Readable</div></div>
            <div class="card"><div class="label">Pace</div><div class="value">Short</div></div>
          </div>
        </div>
      `;

      const visualPreview = `
        <style>
          body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #fff; color: #24292f; }
          .sheet { display: grid; grid-template-columns: 180px 1fr; min-height: 180px; }
          nav { background: #f6f8fa; border-right: 1px solid #d8dee4; padding: 14px; }
          main { padding: 14px; display: grid; gap: 10px; align-content: start; }
          .step { display: flex; gap: 8px; align-items: center; margin: 0 0 10px; }
          .dot { width: 8px; height: 8px; border-radius: 999px; background: #0969da; }
          .card { border: 1px solid #d8dee4; border-radius: 8px; padding: 10px; }
          button { border: 0; border-radius: 6px; background: #0969da; color: white; padding: 7px 10px; font-weight: 650; width: fit-content; }
        </style>
        <div class="sheet">
          <nav>
            <div class="step"><span class="dot"></span><span>Scope</span></div>
            <div class="step"><span class="dot"></span><span>Tradeoffs</span></div>
            <div class="step"><span class="dot"></span><span>Export</span></div>
          </nav>
          <main>
            <strong>Review before implementation</strong>
            <div class="card">Show the smallest useful set of decisions, with comments available on every option.</div>
            <button>Export answers</button>
          </main>
        </div>
      `;

      h.mount({
        title: "Interview Harness All Question Types Test",
        intro: "A local test interview for testing text, single choice, many choice, classify, bucket, rank, edit, comments, custom options, rich content, and export output.",
        storageKey: "interview-harness-question-type-test",
        questions: [
          h.text({
            id: "test_goal",
            prompt: "What behavior are you most interested in testing first?",
            multiline: true,
            placeholder: "Example: persistence, export shape, option comments, keyboard feel, drag-and-drop, iframe sizing, mobile layout.",
            defaultValue: "I want to confirm that every question type renders, accepts input, preserves comments, and exports only changed answers."
          }),

          h.choice({
            id: "test_mode",
            prompt: "Which test path should this interview optimize for?",
            select: "one",
            cardsPerRow: 3,
            options: [
              h.option({
                id: "authoring_surface",
                title: "Authoring surface smoke test",
                tags: ["Recommended", "broad"],
                body: [
                  h.html({ markup: "<div>Exercise every helper once and verify the resulting export is easy for an agent to read.</div>" }),
                  h.prosCons({
                    pros: ["Covers the public API quickly", "Good fit for regression checks", "Keeps the page short enough to finish"],
                    cons: ["Does not deeply test a single workflow"]
                  })
                ]
              }),
              h.option({
                id: "real_workflow",
                title: "Real workflow simulation",
                tags: ["realistic"],
                body: [
                  h.html({ markup: "<div>Use a plausible product decision interview and watch whether the questions actually change next actions.</div>" }),
                  h.prosCons({
                    pros: ["Better signal on interview quality", "Surfaces awkward copy or pacing"],
                    cons: ["May not touch every helper evenly"]
                  })
                ]
              }),
              h.option({
                id: "layout_stress",
                title: "Layout stress test",
                tags: ["visual"],
                body: [
                  h.frame({
                    title: "Compact preview",
                    fileName: "compact-preview.html",
                    height: 190,
                    srcdoc: compactPreview
                  }),
                  h.prosCons({
                    pros: ["Checks dense cards, tables, frames, and code blocks", "Useful before public examples"],
                    cons: ["Can bias the interview toward visual coverage over decision quality"]
                  })
                ]
              })
            ]
          }),

          h.choice({
            id: "helpers_to_stress",
            prompt: "Which helper behaviors should get extra attention?",
            select: "many",
            cardsPerRow: 4,
            options: [
              h.option({
                id: "comments",
                title: "Option comments",
                tags: ["state"],
                body: h.html({ markup: "<div>Comment on selected and unselected options, then export to confirm the notes are present.</div>" })
              }),
              h.option({
                id: "custom_options",
                title: "Custom options",
                tags: ["choice"],
                body: h.html({ markup: "<table><tr><th>Area</th><th>Check</th></tr><tr><td>Many-choice</td><td>Add one custom option.</td></tr><tr><td>Classify</td><td>Add one term.</td></tr></table>" })
              }),
              h.option({
                id: "code_blocks",
                title: "Code and edit blocks",
                tags: ["syntax"],
                body: h.code({
                  lang: "json",
                  value: `{
  "expectation": "highlighted code renders and exports cleanly",
  "changedAnswersOnly": true
}`
                })
              }),
              h.option({
                id: "iframes",
                title: "Inline frame previews",
                tags: ["rich"],
                body: h.frame({
                  title: "Visual preview",
                  fileName: "visual-preview.html",
                  height: 220,
                  srcdoc: visualPreview
                })
              })
            ]
          }),

          h.classify({
            id: "api_terms",
            prompt: "Classify these authoring terms, edit any wording that feels unclear, and add a missing term if one jumps out.",
            states: ["clear", "needs example", "rename", "avoid"],
            options: [
              h.option({
                id: "question_helper",
                title: "Question helper - A function that creates an interactive prompt, such as text, choice, rank, bucket, classify, or edit.",
                tags: ["API"],
                body: h.html({ markup: "<div>Use this when discussing the public authoring surface.</div>" })
              }),
              h.option({
                id: "content_helper",
                title: "Content helper - A function that renders supporting material inside a question option.",
                tags: ["API"],
                body: h.html({ markup: "<div>Examples include HTML snippets, iframe previews, pros/cons, and code blocks.</div>" })
              }),
              h.option({
                id: "artifact",
                title: "Artifact - A short editable piece of text or code shown in an edit question.",
                tags: ["edit"],
                body: h.code({
                  lang: "md",
                  value: "Make the thing small enough that editing it in the interview feels natural."
                })
              }),
              h.option({
                id: "changed_answers",
                title: "Changed answers - The exported values the user entered, selected, reordered, reclassified, commented on, or edited.",
                tags: ["export"],
                body: h.html({ markup: "<div>This term matters because unchanged defaults should stay out of the final export.</div>" })
              })
            ]
          }),

          h.bucket({
            id: "decision_timing",
            prompt: "Sort these harness decisions by when you want an agent to settle them.",
            buckets: ["decide before authoring", "decide while authoring", "leave to comments", "skip for now"],
            options: [
              h.option({
                id: "question_count",
                title: "Number of questions",
                tags: ["scope"],
                body: h.html({ markup: "<div>Too many questions can make a temporary interview feel like homework.</div>" })
              }),
              h.option({
                id: "default_path",
                title: "Strong default path",
                tags: ["bias"],
                body: h.prosCons({
                  pros: ["Makes the likely answer reviewable", "Helps the user move quickly"],
                  cons: ["Can hide alternatives if copy is too confident"]
                })
              }),
              h.option({
                id: "export_format",
                title: "Text or JSON export emphasis",
                tags: ["output"],
                body: h.html({ markup: "<div>Human-readable text should stay pleasant for one-off agent handoff.</div>" })
              }),
              "Exact card density",
              "Whether to include iframe previews",
              "Whether option labels need tags",
              "How much copy belongs in the intro"
            ]
          }),

          h.rank({
            id: "success_criteria",
            prompt: "Rank what would make this test interview successful.",
            options: [
              "Every question type is visible and usable",
              "The exported text is compact and readable",
              "Comments on unselected options are preserved",
              "The page feels useful rather than like a feature museum",
              "Rich content renders without layout surprises",
              "Defaults are reviewable without feeling pushy"
            ]
          }),

          h.choice({
            id: "preview_pattern",
            prompt: "Which rich preview pattern best belongs in the next curated example?",
            select: "one",
            cardsPerRow: 2,
            options: [
              h.option({
                id: "side_by_side",
                title: "Side-by-side design comparison",
                tags: ["visual", "cardsPerRow: 2"],
                body: [
                  h.html({ markup: "<div>Good for choosing between two UI directions where differences should be inspected, not described.</div>" }),
                  h.frame({
                    title: "Side-by-side preview",
                    fileName: "side-by-side-preview.html",
                    height: 230,
                    srcdoc: `
                      <style>
                        body { margin: 0; font: 14px system-ui, sans-serif; color: #202124; }
                        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; background: #f6f8fa; min-height: 200px; }
                        .panel { border: 1px solid #d8dee4; border-radius: 8px; background: #fff; padding: 12px; display: grid; gap: 10px; align-content: start; }
                        .hero { height: 58px; border-radius: 6px; background: linear-gradient(135deg, #c2f0d2, #9cc8ff); }
                        .list { display: grid; gap: 6px; }
                        .row { height: 10px; border-radius: 999px; background: #d8dee4; }
                        .row:nth-child(2) { width: 72%; }
                      </style>
                      <div class="grid">
                        <div class="panel"><strong>Visual first</strong><div class="hero"></div><div class="list"><div class="row"></div><div class="row"></div></div></div>
                        <div class="panel"><strong>Decision first</strong><div class="list"><div class="row"></div><div class="row"></div><div class="row"></div></div><button>Choose</button></div>
                      </div>
                    `
                  })
                ]
              }),
              h.option({
                id: "schema_review",
                title: "Schema review with examples",
                tags: ["code", "data"],
                body: [
                  h.html({ markup: "<div>Good when the important choice is output shape or data contract.</div>" }),
                  h.code({
                    lang: "ts",
                    value: `type InterviewExport = {
  answers: Record<string, unknown>;
  comments?: Array<{
    questionId: string;
    optionId?: string;
    text: string;
  }>;
};`
                  })
                ]
              })
            ]
          }),

          h.edit({
            id: "export_summary",
            prompt: "Edit the handoff summary until it captures what an agent should do after reading the export.",
            language: "md",
            artifact: h.code({
              lang: "md",
              value: `Use the exported answers to update the interview-harness authoring guidance.
Preserve the public helper API unless the test exposes a concrete usability issue.
Keep throwaway interview drafts untracked unless they become curated examples.`
            })
          })
        ]
      });
    </script>
  </body>
</html>
