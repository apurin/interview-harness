<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Choose Between Two Designs</title>
  </head>
  <body>
    <div id="interview-harness"></div>
    <script src="./interview-harness.js"></script>
    <script>
      const h = InterviewHarness;

      h.mount({
        title: "Choose between two designs",
        intro: "Review the two embedded design files and pick the direction I should use as the base.",
        pageMode: "all",
        questions: [
          h.one("preferred_design", "Which design should I continue with?", [
            h.item("design_a", "Design A", [
              h.frame("design-a.html", { title: "Design A", height: "min(72vh, 760px)" })
            ]),
            h.item("design_b", "Design B", [
              h.frame("design-b.html", { title: "Design B", height: "min(72vh, 760px)" })
            ])
          ]),

          h.text("notes", "What should change before the next pass?", {
            multiline: true,
            placeholder: "Keep this, drop that, combine these pieces, or fix this before implementing."
          })
        ]
      });
    </script>
  </body>
</html>
